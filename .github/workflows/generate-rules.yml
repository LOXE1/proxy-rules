name: Generate proxy rules

on:
  workflow_dispatch:
  push:
    paths:
      - rules/source.json
      - scripts/generate_rules.py
      - .github/workflows/generate-rules.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate and validate
        run: |
          python scripts/generate_rules.py
          git diff --check

      - name: Commit generated files
        run: |
          if git diff --quiet; then
            echo "Generated files are already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add clash/rules quantumultx/managed.list
          git commit -m "rules: regenerate client formats"
          git push
